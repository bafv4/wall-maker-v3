<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- SeedQueue Wall Maker icon (v3) — monotone -->
  <!-- Concept: top-down view of the SeedQueue wall.
       2x2 main instance grid + side group column, white grid lines,
       GUI frame. One cell is highlighted (lighter gray) = the active /
       selected instance. Grayscale only (no hue). -->

  <!-- outer outline for crispness at small sizes -->
  <rect x="0" y="0" width="512" height="512" rx="26" fill="#0a0a0a"/>

  <!-- GUI frame (lit) -->
  <rect x="8" y="8" width="496" height="496" rx="20" fill="#525252"/>
  <!-- frame bevel: top-left highlight, bottom-right shadow -->
  <path d="M8 28 V480 a20 20 0 0 0 20 20 H40 V40 a12 12 0 0 1 12 -12 H484 V8 H28 a20 20 0 0 0 -20 20 Z" fill="#707070" opacity="0.7"/>
  <path d="M504 32 V484 a20 20 0 0 1 -20 20 H28 a20 20 0 0 0 20 -4 H472 a12 12 0 0 0 12 -12 V28 Z" fill="#3a3a3a" opacity="0.7"/>

  <!-- sunken content well: light fill becomes the white grid lines -->
  <rect x="44" y="44" width="424" height="424" rx="10" fill="#0a0a0a"/>
  <rect x="48" y="48" width="416" height="416" rx="8" fill="#e5e5e5"/>

  <!-- ===== main 2x2 instance grid ===== -->
  <!-- TL -->
  <rect x="60" y="60" width="138" height="190" rx="6" fill="#3f3f3f"/>
  <rect x="60" y="60" width="138" height="34" rx="6" fill="#565656"/>
  <!-- TR : active / selected instance (lighter gray + white outline) -->
  <rect x="210" y="60" width="138" height="190" rx="6" fill="#9a9a9a"/>
  <rect x="210" y="60" width="138" height="34" rx="6" fill="#c4c4c4"/>
  <rect x="210" y="60" width="138" height="190" rx="6" fill="none" stroke="#ffffff" stroke-width="5"/>
  <!-- BL -->
  <rect x="60" y="262" width="138" height="190" rx="6" fill="#3f3f3f"/>
  <rect x="60" y="262" width="138" height="34" rx="6" fill="#565656"/>
  <!-- BR -->
  <rect x="210" y="262" width="138" height="190" rx="6" fill="#3f3f3f"/>
  <rect x="210" y="262" width="138" height="34" rx="6" fill="#565656"/>

  <!-- ===== side group column, 5 rows ===== -->
  <rect x="384" y="60"  width="68" height="72" rx="5" fill="#6b6b6b"/>
  <rect x="384" y="140" width="68" height="72" rx="5" fill="#6b6b6b"/>
  <rect x="384" y="220" width="68" height="72" rx="5" fill="#6b6b6b"/>
  <rect x="384" y="300" width="68" height="72" rx="5" fill="#6b6b6b"/>
  <rect x="384" y="380" width="68" height="72" rx="5" fill="#6b6b6b"/>
</svg>
